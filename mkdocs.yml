site_name: Leo Li's Notebook  
site_author: Leo Li
theme: 
  name: material
  custom_dir: overrides
  palette:
 # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent:  teal
      toggle:
        icon: material/brightness-4
        name: 切换至日间模式
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: orange
      toggle:
        icon: material/brightness-7
        name: 切换至夜间模式
 
  font:
    text: Merriweather
    code: JetBrains Mono
  features:
     # - header.autohide #自动隐藏头栏
    # - announce.dismiss # 公告栏
    # - navigation.instant #这玩意跟公式爆了
    - navigation.tracking # 在url中使用标题定位锚点
    - navigation.path # 显示当前路径
    - navigation.prune # 侧边栏自动折叠
    - navigation.tabs # 顶部显示导航顶层nav（也就是第一个节点）
    # - navigation.tabs.sticky # 滚动是隐藏顶部nav，需要配合navigation.tabs使用
    - navigation.indexes # 指定节点index pages ，跟instant不兼容
    - navigation.top # 一键回顶部
    - navigation.footer # 底部导航
    - search.highlight # 搜索高亮
    - search.suggest # 搜索建议
    - toc.follow # toc 跟随
    - content.code.annotate # 代码行号
    - content.code.copy # 代码复制

  icon:
    repo: fontawesome/brands/github
    logo: material/library-shelves  
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16



nav:  
  - HOME: index.md  
  - ZJU CS COURSES:  
    - ZJU CS COURSES/index.md  
    - ADVANCED DATA STRUCTURE AND ALGORITHMS:  
      - ZJU CS COURSES/ADS/index.md
      - AVL, Splay Trees and Amortized Analysis: ZJU CS COURSES/ADS/Chapter_One.md
      - NP Problems: ZJU CS COURSES/ADS/Chapter_Ten.md
      - Approximation: ZJU CS COURSES/ADS/Chapter_Eleven.md
    - ALGORITHM IN GAMES:  
      - ZJU CS COURSES/ALGORITHM IN GAMES/index.md
      - Introduction: ZJU CS COURSES/ALGORITHM IN GAMES/Chapter_One.md  
      - Pygame: ZJU CS COURSES/ALGORITHM IN GAMES/Chapter_Two.md  
      - Mazes Algorithms: ZJU CS COURSES/ALGORITHM IN GAMES/Chapter_Three.md  
      - Navigation Algorithms: ZJU CS COURSES/ALGORITHM IN GAMES/Chapter_Four.md  
      - Collision Detection: ZJU CS COURSES/ALGORITHM IN GAMES/Chapter_Five.md    
    - COMPUTER ORGANIZATION DESIGH:  
      - ZJU CS COURSES/COMPUTER ORGANIZATION DESIGN/index.md  
      - Instructions: ZJU CS COURSES/COMPUTER ORGANIZATION DESIGN/Chapter_Two.md  
      - Arithmetic: ZJU CS COURSES/COMPUTER ORGANIZATION DESIGN/Chapter_Three.md  
      - The Processor: ZJU CS COURSES/COMPUTER ORGANIZATION DESIGN/Chapter_Four.md  
      - Verilog: ZJU CS COURSES/COMPUTER ORGANIZATION DESIGN/Verilog.md 
    - DIGITAL IMAGE PROCESSING:  
      - ZJU CS COURSES/DIGITAL IMAGE PROCESSING/index.md  
      - Introduction: ZJU CS COURSES/DIGITAL IMAGE PROCESSING/Chpater_One.md  
      - Binary Image Processing: ZJU CS COURSES/DIGITAL IMAGE PROCESSING/Chapter_Two.md
    - NUMERICAL ANALYSIS:  
      - ZJU CS COURSES/NUMERICAL ANALYSIS/index.md  
      - Approximation Theory: ZJU CS COURSES/NUMERICAL ANALYSIS/Chapter_Eight.md  
      - Interpolation: ZJU CS COURSES/NUMERICAL ANALYSIS/Chapter_Three.md  
      - Numerical Differentation and Integration: ZJU CS COURSES/NUMERICAL ANALYSIS/Chapter_Four.md  
  - EXTRA CS COURSES:  
    - EXTRA/index.md  
    - MACHINE LEARNING:  
      - EXTRA/MACHINE LEARNING/index.md  
      - Intro: EXTRA/MACHINE LEARNING/Week_One.md  
    - GAMES 101:  
      - EXTRA/GAMES101/index.md
      - Introduction: EXTRA/GAMES101/Course_One.md
    
repo_url: https://github.com/Leo11-strive/Leo-s-Notebook
repo_name: Leo Li's Notebook  
markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - pymdownx.snippets
  - def_list
  - footnotes
  - pymdownx.highlight:
      auto_title: true
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - md_in_html
  - pymdownx.superfences
  - pymdownx.magiclink
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.highlight
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.mark
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem

      
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      clickable_checkbox: true
  
  - toc:
      permalink: true
      title: Navigator
  - tables
extra_javascript:
